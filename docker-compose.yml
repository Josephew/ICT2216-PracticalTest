version: "3.9"

services:

  # ---------- Q1 / Q2: Web server (HTTPS via self-signed cert) ----------
  webserver:
    image: nginx:1.27-alpine
    container_name: webserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ---------- Q4: Backend API (added in the next step) ----------
  backend:
    build: ./backend
    container_name: backend
    environment:
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASSWORD=apppassword
      - DB_NAME=searchapp
      - PORT=3000
    depends_on:
      - db
    restart: unless-stopped

  # ---------- Q4i: Database to store validated search queries ----------
  db:
    image: postgres:16-alpine
    container_name: search_db
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=searchapp
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # ---------- Q3: Local git server ----------
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=http://127.0.0.1:3001/
      - GITEA__server__HTTP_PORT=3000
    volumes:
      - ./gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3001:3000"   # web UI: http://127.0.0.1:3001
      - "2222:22"     # git over SSH (optional)
    restart: unless-stopped

  # ---------- Q7: SonarQube (added in that step) ----------
  # sonarqube:
  #   image: sonarqube:community
  #   ...  (we'll wire this up when we reach Q7)

volumes:
  db_data:
